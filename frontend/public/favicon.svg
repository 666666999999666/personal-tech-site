<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- 猫耳朵 -->
  <polygon points="20,40 30,10 45,35" fill="#FFB347"/>
  <polygon points="80,40 70,10 55,35" fill="#FFB347"/>
  <polygon points="25,38 32,16 42,35" fill="#FF8C69"/>
  <polygon points="75,38 68,16 58,35" fill="#FF8C69"/>
  <!-- 猫头 -->
  <circle cx="50" cy="55" r="30" fill="#FFB347"/>
  <!-- 眼睛 -->
  <ellipse cx="38" cy="50" rx="5" ry="6" fill="#333"/>
  <ellipse cx="62" cy="50" rx="5" ry="6" fill="#333"/>
  <!-- 眼睛高光 -->
  <circle cx="40" cy="48" r="2" fill="#FFF"/>
  <circle cx="64" cy="48" r="2" fill="#FFF"/>
  <!-- 鼻子 -->
  <ellipse cx="50" cy="58" rx="3" ry="2" fill="#FF8C69"/>
  <!-- 嘴巴 -->
  <path d="M44,62 Q50,68 56,62" fill="none" stroke="#333" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M50,60 L50,62" fill="none" stroke="#333" stroke-width="1.5" stroke-linecap="round"/>
  <!-- 胡须 -->
  <line x1="15" y1="54" x2="33" y2="56" stroke="#333" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="15" y1="60" x2="33" y2="60" stroke="#333" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="85" y1="54" x2="67" y2="56" stroke="#333" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="85" y1="60" x2="67" y2="60" stroke="#333" stroke-width="1.2" stroke-linecap="round"/>
  <!-- 腮红 -->
  <circle cx="32" cy="60" r="5" fill="#FF9999" opacity="0.5"/>
  <circle cx="68" cy="60" r="5" fill="#FF9999" opacity="0.5"/>
</svg>
