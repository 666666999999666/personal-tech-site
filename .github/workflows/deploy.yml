name: Build and Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script_stop: true
          command_timeout: 20m
          script: |
            # Install Docker using China mirror if not present
            if ! command -v docker &> /dev/null; then
              echo "Installing Docker (Aliyun mirror)..."
              curl -fsSL https://mirrors.aliyun.com/docker-ce/linux/ubuntu/gpg | sudo gpg --dearmor -o /usr/share/keyrings/docker-archive-keyring.gpg
              echo "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/docker-archive-keyring.gpg] https://mirrors.aliyun.com/docker-ce/linux/ubuntu $(lsb_release -cs) stable" | sudo tee /etc/apt/sources.list.d/docker.list > /dev/null
              sudo apt-get update -qq
              sudo apt-get install -y -qq docker-ce docker-ce-cli containerd.io docker-compose-plugin
              sudo usermod -aG docker $USER
              echo "Docker installed successfully"
            fi

            # Install Git if not present
            if ! command -v git &> /dev/null; then
              echo "Installing Git..."
              sudo apt-get update -qq
              sudo apt-get install -y -qq git
            fi

            # Clone or update repo
            if [ ! -d /opt/personal-site-v2/.git ]; then
              echo "Cloning repository..."
              sudo rm -rf /opt/personal-site-v2
              sudo git clone https://github.com/666666999999666/Personal-Site-V1.git /opt/personal-site-v2
              sudo chown -R $USER:$USER /opt/personal-site-v2
            else
              echo "Pulling latest code..."
              cd /opt/personal-site-v2
              git fetch origin
              git reset --hard origin/main
            fi

            # Build and run
            cd /opt/personal-site-v2
            docker compose up -d --build --remove-orphans
            docker image prune -f
