name: Build and Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script_stop: true
          command_timeout: 15m
          script: |
            # Install Docker if not present
            if ! command -v docker &> /dev/null; then
              echo "Installing Docker..."
              curl -fsSL https://get.docker.com | sh
              sudo usermod -aG docker $USER
            fi

            # Install Docker Compose if not present
            if ! command -v docker compose &> /dev/null; then
              echo "Installing Docker Compose plugin..."
              sudo apt-get update -qq
              sudo apt-get install -y -qq docker-compose-plugin
            fi

            # Install Git if not present
            if ! command -v git &> /dev/null; then
              echo "Installing Git..."
              sudo apt-get update -qq
              sudo apt-get install -y -qq git
            fi

            # Clone or update repo
            if [ ! -d /opt/personal-site-v2/.git ]; then
              echo "Cloning repository..."
              sudo rm -rf /opt/personal-site-v2
              sudo git clone https://github.com/666666999999666/Personal-Site-V1.git /opt/personal-site-v2
              sudo chown -R $USER:$USER /opt/personal-site-v2
            else
              echo "Pulling latest code..."
              cd /opt/personal-site-v2
              git pull origin main
            fi

            # Build and run
            cd /opt/personal-site-v2
            docker compose up -d --build --remove-orphans
            docker image prune -f
